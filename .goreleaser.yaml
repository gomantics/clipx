version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/clipx
    binary: clipx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

brews:
  - repository:
      owner: gomantics
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/gomantics/clipx"
    description: "LAN clipboard sync for macOS. Copy on one Mac, paste on another."
    license: "MIT"
    install: |
      bin.install "clipx"
    test: |
      system "#{bin}/clipx", "version"

release:
  github:
    owner: gomantics
    name: clipx
  
  draft: false
  replace_existing_draft: true
  target_commitish: '{{ .Commit }}'
  footer: |
    
    ### Installation
    
    ```bash
    # Homebrew
    brew install gomantics/tap/clipx
    
    # Go
    go install github.com/gomantics/clipx/cmd/clipx@{{ .Tag }}
    
    # Or download the binary from the assets above
    ```

    **Full Changelog**: https://github.com/gomantics/clipx/compare/{{ .PreviousTag }}...{{ .Tag }}
